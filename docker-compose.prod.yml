services:
  # Nginx reverse proxy with SSL
  nginx:
    image: nginx:alpine
    container_name: submitheses-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - submitheses-network
    restart: unless-stopped

  # Certbot for Let's Encrypt certificate renewal
  certbot:
    image: certbot/certbot
    container_name: submitheses-certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    networks:
      - submitheses-network

  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    container_name: submitheses-postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-submitheses}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - submitheses-network
    restart: unless-stopped

  # Redis cache and message broker
  redis:
    image: redis:7-alpine
    container_name: submitheses-redis
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - submitheses-network
    restart: unless-stopped

  # Garage - self-hosted S3-compatible object storage
  garage:
    image: dxflrs/garage:v1.1.0
    container_name: submitheses-garage
    ports:
      - "3900:3900"  # S3 API
      - "3903:3903"  # Admin API
    volumes:
      - garage-data:/var/lib/garage/data
      - garage-meta:/var/lib/garage/meta
      - ./garage.toml:/etc/garage.toml:ro
    healthcheck:
      test: ["CMD", "/garage", "stats"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - submitheses-network
    restart: unless-stopped

  # Backend API
  backend:
    image: ghcr.io/krxgq/submitheses/backend:latest
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: submitheses-backend
    environment:
      - NODE_ENV=production
      - PORT=5000
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
      - JWT_ISSUER=${JWT_ISSUER:-submit-theses}
      - DATABASE_URL=${DATABASE_URL}
      - DIRECT_URL=${DIRECT_URL}
      - REDIS_URL=redis://redis:6379
      - REDIS_ENABLED=true
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_SECURE=${SMTP_SECURE:-false}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-SumbiTheses System}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL}
      - APP_URL=${APP_URL:-http://localhost:3000}
      # S3-compatible storage (Garage)
      - S3_ENDPOINT=${S3_ENDPOINT:-http://garage:3900}
      - AWS_REGION=${AWS_REGION:-garage}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_S3_BUCKET_ATTACHMENTS=${AWS_S3_BUCKET_ATTACHMENTS:-sumbitheses-attachments}
      - AWS_S3_BUCKET_AVATARS=${AWS_S3_BUCKET_AVATARS:-sumbitheses-avatars}
      - USE_S3_STORAGE=${USE_S3_STORAGE:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      garage:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - submitheses-network
    restart: unless-stopped

  # Frontend (Next.js)
  frontend:
    image: ghcr.io/krxgq/submitheses/frontend:latest
    build:
      context: .
      dockerfile: ./frontend/Dockerfile
    container_name: submitheses-frontend
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:5000}
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
      - JWT_ISSUER=${JWT_ISSUER:-submit-theses}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - submitheses-network
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  garage-data:
    driver: local
  garage-meta:
    driver: local
  certbot-webroot:
    driver: local
  certbot-certs:
    driver: local

networks:
  submitheses-network:
    driver: bridge
