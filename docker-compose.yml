services:
  # PostgreSQL database (local)
  postgres:
    image: postgres:15-alpine
    container_name: submitheses-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-submitheses}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      # Mount init script to import schema
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - submitheses-network
    restart: unless-stopped

  # Redis cache
  redis:
    image: redis:7-alpine
    container_name: submitheses-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - submitheses-network

  # Mailpit - SMTP server for development/testing
  mailpit:
    image: axllent/mailpit:latest
    container_name: submitheses-mailpit
    ports:
      - "8025:8025"  # Web UI
      - "1025:1025"  # SMTP server
    environment:
      - MP_MAX_MESSAGES=5000
      - MP_SMTP_AUTH_ACCEPT_ANY=1
      - MP_SMTP_AUTH_ALLOW_INSECURE=1
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8025/api/v1/info"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - submitheses-network
    restart: unless-stopped

  # Backend API
  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
    container_name: submitheses-backend
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - CORS_ORIGIN=http://localhost:3000

      # JWT Configuration (CHANGE THESE IN PRODUCTION!)
      - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET:-your-secret-access-key-change-in-production}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-your-secret-refresh-key-change-in-production}
      - JWT_ISSUER=${JWT_ISSUER:-submit-theses}

      # Database Configuration (from .env)
      - DATABASE_URL=${DATABASE_URL}
      - DIRECT_URL=${DIRECT_URL}

      # Redis
      - REDIS_URL=redis://redis:6379
      - REDIS_ENABLED=true

      # SMTP Configuration (Mailpit for development)
      - SMTP_HOST=mailpit
      - SMTP_PORT=1025
      - SMTP_SECURE=false
      - SMTP_USER=
      - SMTP_PASSWORD=
      - SMTP_FROM_NAME=SumbiTheses System
      - SMTP_FROM_EMAIL=noreply@submitheses.local
      - APP_URL=http://localhost:3000

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    volumes:
      # Mount for hot reload in development (optional)
      - ./backend/src:/app/src
      - ./backend/uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - submitheses-network
    restart: unless-stopped

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local

networks:
  submitheses-network:
    driver: bridge
