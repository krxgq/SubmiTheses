<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SumbiTheses</title>
  <style>
    :root {
      --bg:      #f2ece2;   /* warm parchment */
      --surface: #fdf8f0;   /* light cream cards */
      --hover:   #e8dfd0;
      --border:  #b8a898;
      --text:    #1a1208;   /* near-black warm */
      --muted:   #5a4e3c;
      --subtle:  #8a7a68;
      --primary: #2c5f3f;   /* forest green */
      --accent:  #7a3b1e;   /* terracotta */
      --font: "Courier New", Courier, monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
    }

    .container {
      width: 100%;
      max-width: 760px;
    }

    /* Header with notched label */
    .header {
      border: 1.5px solid var(--border);
      background: var(--surface);
      padding: 2rem 2.4rem;
      margin-bottom: 1.8rem;
      position: relative;
    }

    .header::before {
      content: "[ SubmiTheses ]";
      position: absolute;
      top: -0.75rem;
      left: 1.4rem;
      background: var(--bg);
      padding: 0 0.6rem;
      font-size: 0.85rem;
      color: var(--accent);
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .header h1 {
      font-size: 2.6rem;
      font-weight: normal;
      letter-spacing: 0.04em;
      color: var(--primary);
    }

    .header h1 span { color: var(--accent); }

    .header p {
      color: var(--muted);
      font-size: 1.05rem;
      margin-top: 0.5rem;
      letter-spacing: 0.04em;
    }

    /* Link list */
    nav ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.7rem;
    }

    nav li a {
      display: flex;
      align-items: baseline;
      gap: 1.4rem;
      padding: 1.3rem 1.8rem;
      background: var(--surface);
      border: 1.5px solid var(--border);
      text-decoration: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 1.2rem;
      transition: border-color 0.15s, background 0.15s;
    }

    nav li a:hover {
      border-color: var(--primary);
      background: var(--hover);
    }

    nav li a::before {
      content: "→";
      color: var(--primary);
      flex-shrink: 0;
      transition: transform 0.15s;
    }

    nav li a:hover::before { transform: translateX(5px); }

    .link-label { flex: 1; }

    .link-desc {
      font-size: 0.95rem;
      color: var(--subtle);
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>Submi<span>Theses</span></h1>
      <p>thesis submission &amp; management system</p>
    </header>

    <nav>
      <ul>
        <li>
          <a href="https://submitheses.app" target="_blank" rel="noopener">
            <span class="link-label">Application</span>
            <span class="link-desc">submitheses.app ↗</span>
          </a>
        </li>
        <li>
          <a href="/documentation.pdf">
            <span class="link-label">PDF Documentation</span>
            <span class="link-desc">.pdf</span>
          </a>
        </li>
        <li>
          <a href="documentation.typ">
            <span class="link-label">Typst Source</span>
            <span class="link-desc">.typ</span>
          </a>
        </li>
        <li>
          <a href="navod-k-instalaci.html">
            <span class="link-label">Návod k instalaci</span>
            <span class="link-desc">.html</span>
          </a>
        </li>
      </ul>
    </nav>
  </div>
</body>
</html>
