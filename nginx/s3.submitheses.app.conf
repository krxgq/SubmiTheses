# S3 proxy — routes browser requests to Garage object storage
# Used for presigned URL uploads/downloads from the frontend
server {
    server_name s3.submitheses.app;

    location / {
        # Handle CORS preflight requests
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' 'https://submitheses.app';
            add_header 'Access-Control-Allow-Methods' 'GET, PUT, DELETE, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization';
            add_header 'Access-Control-Max-Age' 3600;
            return 204;
        }

        # CORS header for actual requests
        add_header 'Access-Control-Allow-Origin' 'https://submitheses.app' always;

        proxy_pass http://127.0.0.1:3900;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 12M;
    }

    # SSL managed by Certbot
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/submitheses.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/submitheses.app/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    server_name s3.submitheses.app;

    if ($host = s3.submitheses.app) {
        return 301 https://$host$request_uri;
    }

    return 404;
}
